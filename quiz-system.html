 <!DOCTYPE html>
<html>
<head>

<title>MCQ Quiz</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<h2>Science Quiz</h2>

<p id="timer">Time: 30</p>

<h4 id="question"></h4>

<div id="options"></div>

<button onclick="nextQuestion()" class="btn btn-primary mt-3">
Next
</button>

<h3 id="score"></h3>

</div>

<script>

let quiz=[
{
q:"Speed of light is?",
o:["3x10^8 m/s","3x10^6 m/s","3x10^4 m/s"],
a:0
},

{
q:"Chemical symbol of Oxygen?",
o:["O","H","C"],
a:0
}

];

let index=0;
let score=0;
let time=30;

function loadQuestion(){

document.getElementById("question").innerText=
quiz[index].q;

let options="";

quiz[index].o.forEach((opt,i)=>{

options+=
`<button class="btn btn-outline-dark d-block m-2"
onclick="check(${i})">${opt}</button>`;

});

document.getElementById("options").innerHTML=options;

}

function check(i){

if(i==quiz[index].a){

score++;

}

}

function nextQuestion(){

index++;

if(index<quiz.length){

loadQuestion();

}else{

document.getElementById("score").innerText=
"Your Score: "+score;

}

}

setInterval(function(){

time--;

document.getElementById("timer").innerText="Time: "+time;

if(time==0){

alert("Time Up");

location.reload();

}

},1000);

loadQuestion();

</script>

</body>
</html>
